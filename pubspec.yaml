name: sales_reporting_app
description: Sales Reporting Mobile Application for Cyber Mas Solutions assessment.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # Local Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # Charts (Bonus)
  fl_chart: ^0.68.0

  # UI
  cupertino_icons: ^1.0.6
  shimmer: ^3.0.0
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
